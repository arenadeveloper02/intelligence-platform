<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #070910; color: #e2e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      height: 56px; padding: 0 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,7,15,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 0; }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }
    .brand-name { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .breadcrumb {
      display: flex; align-items: center; gap: 7px;
      margin-left: 16px; padding-left: 16px;
      border-left: 1px solid rgba(255,255,255,0.08);
    }
    .bc-link { font-size: 12px; color: #3d4460; text-decoration: none; transition: color 0.15s; }
    .bc-link:hover { color: #94a3b8; }
    .bc-sep { font-size: 12px; color: #1a1d27; }
    .bc-cur {
      font-size: 12px; font-weight: 600;
      color: {{ accent }};
    }

    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; padding: 3px 12px 3px 3px;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%; overflow: hidden;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 12px; color: #64748b; }
    .sign-out {
      font-size: 11px; color: #3d4460; text-decoration: none;
      padding: 5px 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 7px;
      transition: all 0.15s;
    }
    .sign-out:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); }

    /* Accent line under topbar */
    .topbar-accent {
      height: 2px; flex-shrink: 0;
      background: linear-gradient(90deg, {{ accent }}, transparent 60%);
      opacity: 0.6;
    }

    /* ── Iframe container ── */
    .iframe-wrap {
      flex: 1; position: relative; overflow: hidden;
    }

    .iframe-loader {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: #070910;
      transition: opacity 0.4s ease;
    }
    .iframe-loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,0.15);
      border-top-color: {{ accent }};
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: #3d4460; }

    iframe {
      width: 100%; height: 100%; border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/hub" class="brand">
        <div class="brand-icon">📡</div>
        <span class="brand-name">Platform</span>
      </a>
      <div class="breadcrumb">
        {% for label, href in breadcrumb %}
          <a href="{{ href }}" class="bc-link">{{ label }}</a>
          <span class="bc-sep">›</span>
        {% endfor %}
        <span class="bc-cur">{{ current }}</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-pill">
        <div class="user-avatar">
          {% if user.picture %}<img src="{{ user.picture }}" alt="" />
          {% else %}{{ (user.name or 'U')[:2]|upper }}{% endif %}
        </div>
        <span class="user-name">{{ user.given_name or user.name or 'User' }}</span>
      </div>
      <a href="/logout" class="sign-out">Sign out</a>
    </div>
  </div>
  <div class="topbar-accent"></div>

  <!-- Iframe -->
  <div class="iframe-wrap">
    <div class="iframe-loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading {{ title }}…</div>
    </div>
    <iframe
      src="{{ embed_url }}"
      id="embed-frame"
      allow="clipboard-write; fullscreen"
      onload="document.getElementById('loader').classList.add('hidden')">
    </iframe>
  </div>

  <script>
    (function(){
      var _start = Date.now(), _sent = false;
      function _send(){
        if(_sent) return; _sent = true;
        navigator.sendBeacon('/api/track', JSON.stringify({
          page: window.location.pathname, title: '{{ title }}',
          seconds: Math.round((Date.now()-_start)/1000),
          email: '{{ user.email if user else "" }}'
        }));
      }
      document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') _send(); });
      window.addEventListener('beforeunload', _send);
    })();
  </script>
</body>
</html>
