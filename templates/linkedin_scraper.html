<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn ABM Intelligence — Position²</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c14;
  --bg2:#0f1220;
  --card:#141828;
  --card2:#1a1f30;
  --border:#252b40;
  --border2:#2f3650;
  --text:#e8ecf4;
  --muted:#7a88aa;
  --muted2:#4a5572;
  --green:#3ecf8e;
  --green2:#2ab07b;
  --indigo:#7b8cde;
  --indigo2:#5568c8;
  --amber:#f0a05a;
  --red:#e05c75;
  --cyan:#4dd9e8;
  --aurora1:rgba(62,207,142,0.08);
  --aurora2:rgba(123,140,222,0.06);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:14px;overflow-x:hidden}
body{background:radial-gradient(ellipse at 20% 20%,var(--aurora1) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,var(--aurora2) 0%,transparent 50%),var(--bg)}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,12,20,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.nav-logo span{color:var(--green)}
.nav-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--aurora1);border:1px solid rgba(62,207,142,0.2);color:var(--green);font-weight:500}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--card)}
.nav-tab.active{color:var(--text);background:var(--card2);border:1px solid var(--border2)}

/* ── LAYOUT ── */
.page{display:none;padding:24px;max-width:1400px;margin:0 auto}
.page.active{display:block}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-value.green{color:var(--green)}
.stat-value.indigo{color:var(--indigo)}
.stat-value.amber{color:var(--amber)}
.stat-value.cyan{color:var(--cyan)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-title{font-size:16px;font-weight:600;color:var(--text)}
.sec-count{font-size:12px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:2px 10px}
.sec-filter{margin-left:auto;display:flex;gap:8px}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{border-color:var(--green);color:var(--green);background:rgba(62,207,142,0.08)}

/* ── POST CARDS ── */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer}
.post-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.post-card.expanded{cursor:default}
.post-header{padding:18px 18px 14px}
.post-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.post-author-badge{font-size:11px;font-weight:600;color:var(--green);background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.2);border-radius:6px;padding:3px 8px}
.post-date{font-size:11px;color:var(--muted)}
.post-snippet{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-card.expanded .post-snippet{-webkit-line-clamp:unset}
.post-footer{display:flex;align-items:center;gap:8px}
.eng-count{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--green)}
.eng-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.post-link{margin-left:auto;font-size:11px;color:var(--indigo);text-decoration:none}
.post-link:hover{color:var(--text)}
.toggle-btn{margin-left:8px;font-size:11px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;transition:all .2s}
.toggle-btn:hover{border-color:var(--border2);color:var(--text)}

/* ── ENGAGER LIST ── */
.engager-list{max-height:0;overflow:hidden;transition:max-height .35s ease}
.engager-list.open{max-height:500px;overflow-y:auto}
.engager-list::-webkit-scrollbar{width:4px}
.engager-list::-webkit-scrollbar-track{background:var(--card)}
.engager-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.engager-divider{height:1px;background:var(--border);margin:0 18px}
.engager-item{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;padding:10px 18px;transition:background .15s}
.engager-item:hover{background:var(--card2)}
.engager-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--indigo2),var(--green2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.engager-avatar img{width:100%;height:100%;object-fit:cover}
.engager-info{}
.engager-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.engager-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.engager-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;white-space:nowrap}
.badge-dm{background:rgba(240,160,90,0.15);color:var(--amber);border:1px solid rgba(240,160,90,0.3)}
.badge-sen{background:rgba(123,140,222,0.12);color:var(--indigo);border:1px solid rgba(123,140,222,0.25)}
.badge-react{background:rgba(62,207,142,0.1);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.badge-deg{background:rgba(77,217,232,0.1);color:var(--cyan);border:1px solid rgba(77,217,232,0.2)}
.badge-manager{background:rgba(62,207,142,0.08);color:#6ddfb0;border:1px solid rgba(62,207,142,0.15)}
.badge-ic{background:rgba(122,136,170,0.1);color:var(--muted);border:1px solid var(--border)}
.badge-csuite{background:rgba(240,160,90,0.15);color:var(--amber);border:1px solid rgba(240,160,90,0.3)}

/* ── PEOPLE PAGE ── */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

.bucket-section{margin-bottom:28px}
.bucket-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;margin-bottom:12px;cursor:pointer;transition:background .15s}
.bucket-header:hover{background:var(--card2)}
.bucket-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.bucket-title{font-size:14px;font-weight:600;color:var(--text)}
.bucket-sub{font-size:12px;color:var(--muted);margin-left:auto}
.bucket-chevron{color:var(--muted);transition:transform .2s;font-size:12px}
.bucket-content{display:block}
.bucket-content.collapsed{display:none}

.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.person-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:pointer}
.person-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.person-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.person-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--indigo2),var(--green2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.person-avatar img{width:100%;height:100%;object-fit:cover}
.person-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.person-title{font-size:12px;color:var(--muted);line-height:1.4;margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.person-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.person-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.person-meta-item{font-size:11px;color:var(--muted)}
.person-meta-item span{color:var(--text)}

/* ── COMPANY LEADERBOARD ── */
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:sticky;top:80px}
.lb-title{font-size:14px;font-weight:600;margin-bottom:14px}
.lb-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.lb-item:last-child{border-bottom:none}
.lb-rank{font-size:11px;color:var(--muted);width:18px;text-align:center;font-weight:600}
.lb-rank.top3{color:var(--amber)}
.lb-name{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.lb-bar{height:100%;border-radius:2px;background:var(--green);transition:width .5s}
.lb-num{font-size:12px;font-weight:600;color:var(--green);min-width:20px;text-align:right}

/* ── DRAWER / MODAL ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:0}
.drawer.open{transform:translateX(0)}
.drawer::-webkit-scrollbar{width:4px}
.drawer::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.drawer-header{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10}
.drawer-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.drawer-close:hover{border-color:var(--border2);color:var(--text)}
.drawer-body{padding:20px}
.drawer-section{margin-bottom:20px}
.drawer-sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.info-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.info-value{font-size:14px;font-weight:500;color:var(--text)}
.drawer-snippet{font-size:14px;line-height:1.7;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.drawer-name{font-size:20px;font-weight:700;color:var(--text)}
.drawer-sub{font-size:13px;color:var(--muted)}
.drawer-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--indigo2),var(--green2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;flex-shrink:0;overflow:hidden}
.drawer-avatar img{width:100%;height:100%;object-fit:cover}
.li-link{display:inline-flex;align-items:center;gap:6px;color:var(--indigo);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid rgba(123,140,222,0.3);border-radius:8px;transition:all .2s;margin-top:8px}
.li-link:hover{background:rgba(123,140,222,0.1);color:var(--text)}
.dm-flag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--amber);background:rgba(240,160,90,0.1);border:1px solid rgba(240,160,90,0.25);padding:4px 10px;border-radius:6px}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── MISC ── */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
</style>
</head>

// ── helpers ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function initials(name){return(name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)}
function avatarHtml(name,pic,size){
  const s=size||44;
  if(pic&&pic.trim()&&pic.startsWith('http')){
    return`<div class="person-avatar" style="width:${s}px;height:${s}px"><img src="${esc(pic)}" alt="" onerror="this.parentElement.innerHTML='${initials(name)}'"></div>`;
  }
  return`<div class="person-avatar" style="width:${s}px;height:${s}px">${initials(name)}</div>`;
}
function senBadgeClass(sen){
  if(!sen)return'badge-ic';
  if(sen.includes('C-Level')||sen.includes('Founder'))return'badge-csuite';
  if(sen.includes('VP')||sen.includes('Director'))return'badge-sen';
  if(sen.includes('Manager'))return'badge-manager';
  return'badge-ic';
}
function degLabel(d){
  if(!d)return'';
  if(d.includes('FIRST'))return'1st';
  if(d.includes('SECOND'))return'2nd';
  if(d.includes('THIRD'))return'3rd';
  return d;
}

// ── tab switch ──
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const tabs=document.querySelectorAll('.nav-tab');
  if(t==='post')tabs[0].classList.add('active');
  else tabs[1].classList.add('active');
}

// ── POST INTELLIGENCE ──
function renderPostTab(){
  const {posts,stats}=RAW;
  let html=`
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Total Posts</div><div class="stat-value green">${stats.total_posts}</div></div>
    <div class="stat-card"><div class="stat-label">Total Engagements</div><div class="stat-value indigo">${stats.total_engagements}</div></div>
    <div class="stat-card"><div class="stat-label">Unique People</div><div class="stat-value amber">${stats.total_people}</div></div>
    <div class="stat-card"><div class="stat-label">Decision Makers</div><div class="stat-value green">${stats.total_dms}</div><div class="stat-sub">${Math.round(stats.total_dms/stats.total_people*100)}% of audience</div></div>
    <div class="stat-card"><div class="stat-label">C-Suite / Founders</div><div class="stat-value cyan">${stats.csuite_count}</div></div>
  </div>
  <div class="sec-header">
    <div class="sec-title">Post Performance</div>
    <div class="sec-count">${posts.length} posts</div>
  </div>
  <div class="posts-grid">`;

  posts.forEach((post,pi)=>{
    const cnt=post.engagers.length;
    const dmCount=post.engagers.filter(e=>e.dm&&e.dm.toLowerCase()==='yes').length;
    html+=`
    <div class="post-card" id="pc-${pi}">
      <div class="post-header" onclick="togglePost(${pi})">
        <div class="post-meta">
          <span class="post-author-badge">${esc(post.author||'Position²')}</span>
          <span class="post-date">${esc(post.date)}</span>
        </div>
        <div class="post-snippet">${esc(post.snippet)}</div>
        <div class="post-footer">
          <div class="eng-count"><div class="eng-dot"></div>${cnt} engagement${cnt!==1?'s':''}</div>
          ${dmCount?`<span class="badge badge-dm" style="margin-left:8px">🎯 ${dmCount} DM${dmCount!==1?'s':''}</span>`:''}
          ${post.url?`<a href="${esc(post.url)}" target="_blank" class="post-link" onclick="event.stopPropagation()">↗ View</a>`:''}
          <button class="toggle-btn" onclick="event.stopPropagation();togglePost(${pi})" id="tbtn-${pi}">Show engagers ▾</button>
        </div>
      </div>
      <div class="engager-list" id="el-${pi}">
        <div class="engager-divider"></div>`;

    post.engagers.forEach((e,ei)=>{
      const isDM=e.dm&&e.dm.toLowerCase()==='yes';
      const sen=e.seniority||'';
      html+=`
        <div class="engager-item" onclick="openPersonDrawer(${pi},${ei})" style="cursor:pointer">
          ${avatarHtml(e.name,e.pic,32).replace('person-avatar','engager-avatar')}
          <div class="engager-info">
            <div class="engager-name">${esc(e.name)}</div>
            <div class="engager-sub">${esc(e.title||e.headline)} ${e.company?'· '+esc(e.company):''}</div>
          </div>
          <div class="engager-badges">
            ${isDM?'<span class="badge badge-dm">🎯 DM</span>':''}
            ${sen?`<span class="badge ${senBadgeClass(sen)}">${esc(sen.replace('IC / Individual Contributor','IC').replace('C-Level / Founder','C-Level'))}</span>`:''}
            ${e.reaction?`<span class="badge badge-react">${esc(e.reaction.toLowerCase())}</span>`:''}
            ${e.degree?`<span class="badge badge-deg">${degLabel(e.degree)}</span>`:''}
          </div>
        </div>`;
    });

    html+=`</div></div>`;
  });

  html+='</div>';
  document.getElementById('tab-post').innerHTML=html;
}

function togglePost(pi){
  const el=document.getElementById('el-'+pi);
  const btn=document.getElementById('tbtn-'+pi);
  const card=document.getElementById('pc-'+pi);
  const isOpen=el.classList.contains('open');
  if(isOpen){
    el.classList.remove('open');
    btn.textContent='Show engagers ▾';
    card.classList.remove('expanded');
  } else {
    el.classList.add('open');
    btn.textContent='Hide engagers ▴';
    card.classList.add('expanded');
  }
}

const BUCKETS=[
  {key:'csuite',label:'C-Suite / Founders',icon:'👑',color:'var(--amber)'},
  {key:'vpdirector',label:'VP / Director Level',icon:'📈',color:'var(--indigo)'},
  {key:'managers',label:'Managers',icon:'🏗️',color:'var(--green)'},
  {key:'ics',label:'Individual Contributors',icon:'💼',color:'var(--muted)'},
  {key:'unknown',label:'Unknown',icon:'❓',color:'var(--muted2)'},
];

function renderPeopleTab(){
  const {people,company_lb,stats}=RAW;
  const maxLb=company_lb[0]?company_lb[0][1]:1;

  let html=`
  <div class="two-col">
  <div>
  <div class="stat-row" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="stat-card"><div class="stat-label">Total People</div><div class="stat-value green">${stats.total_people}</div></div>
    <div class="stat-card"><div class="stat-label">Decision Makers</div><div class="stat-value amber">${stats.total_dms}</div><div class="stat-sub">${Math.round(stats.total_dms/stats.total_people*100)}%</div></div>
    <div class="stat-card"><div class="stat-label">C-Suite / Founders</div><div class="stat-value cyan">${stats.csuite_count}</div></div>
  </div>`;

  BUCKETS.forEach(b=>{
    const group=people.filter(p=>p.bucket===b.key);
    if(!group.length)return;
    html+=`
    <div class="bucket-section">
      <div class="bucket-header" onclick="toggleBucket('${b.key}')">
        <div class="bucket-icon" style="background:${b.color}22">${b.icon}</div>
        <div class="bucket-title">${b.label}</div>
        <div class="bucket-sub">${group.length} people</div>
        <div class="bucket-chevron" id="chev-${b.key}">▾</div>
      </div>
      <div class="bucket-content" id="bc-${b.key}">
        <div class="people-grid">`;

    group.forEach((p,pi)=>{
      const idx=people.indexOf(p);
      const isDM=p.dm&&p.dm.toLowerCase()==='yes';
      html+=`
          <div class="person-card" onclick="openPeopleDrawer(${idx})">
            <div class="person-card-top">
              ${avatarHtml(p.name,'')}
              <div>
                <div class="person-name">${esc(p.name)}</div>
                <div class="person-title">${esc(p.title||p.headline)}</div>
              </div>
            </div>
            <div class="person-badges">
              ${isDM?'<span class="badge badge-dm">🎯 Decision Maker</span>':''}
              ${p.seniority?`<span class="badge ${senBadgeClass(p.seniority)}">${esc(p.seniority.replace('IC / Individual Contributor','IC').replace('C-Level / Founder','C-Level'))}</span>`:''}
              ${p.degree?`<span class="badge badge-deg">${degLabel(p.degree)}</span>`:''}
              ${p.posts_engaged>0?`<span class="badge badge-react">${p.posts_engaged} post${p.posts_engaged!==1?'s':''} engaged</span>`:''}
            </div>
            <div class="person-meta">
              ${p.company?`<div class="person-meta-item">🏢 <span>${esc(p.company)}</span></div>`:''}
              ${p.location?`<div class="person-meta-item">📍 <span>${esc(p.location)}</span></div>`:''}
              ${p.industry?`<div class="person-meta-item">🏭 <span>${esc(p.industry)}</span></div>`:''}
              ${p.size?`<div class="person-meta-item">👥 <span>${esc(p.size)}</span></div>`:''}
            </div>
          </div>`;
    });

    html+=`</div></div></div>`;
  });

  html+=`</div>
  <div>
    <div class="lb-card">
      <div class="lb-title">🏆 Company Leaderboard</div>`;
  company_lb.forEach(([name,count],i)=>{
    html+=`
      <div class="lb-item">
        <div class="lb-rank ${i<3?'top3':''}">${i+1}</div>
        <div class="lb-name">${esc(name)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(count/maxLb*100)}%"></div></div>
        <div class="lb-num">${count}</div>
      </div>`;
  });
  html+=`</div></div></div>`;

  document.getElementById('tab-people').innerHTML=html;
}

function toggleBucket(key){
  const bc=document.getElementById('bc-'+key);
  const chev=document.getElementById('chev-'+key);
  if(bc.classList.contains('collapsed')){
    bc.classList.remove('collapsed');
    chev.textContent='▾';
  } else {
    bc.classList.add('collapsed');
    chev.textContent='▸';
  }
}

// ── DRAWER ──
function openDrawer(){
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function openPersonDrawer(postIdx,engIdx){
  const post=RAW.posts[postIdx];
  const e=post.engagers[engIdx];
  const isDM=e.dm&&e.dm.toLowerCase()==='yes';

  document.getElementById('drawerHeader').innerHTML=`
    ${avatarHtml(e.name,e.pic,56).replace('person-avatar','drawer-avatar')}
    <div>
      <div class="drawer-name">${esc(e.name)}</div>
      <div class="drawer-sub">${esc(e.title||e.headline)}</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>`;

  const badges=[];
  if(isDM)badges.push('<span class="badge badge-dm">🎯 Decision Maker</span>');
  if(e.seniority)badges.push(`<span class="badge ${senBadgeClass(e.seniority)}">${esc(e.seniority)}</span>`);
  if(e.degree)badges.push(`<span class="badge badge-deg">${degLabel(e.degree)} degree</span>`);
  if(e.reaction)badges.push(`<span class="badge badge-react">${esc(e.reaction.toLowerCase())}</span>`);

  document.getElementById('drawerBody').innerHTML=`
    <div class="drawer-section">
      <div class="tag-row">${badges.join('')}</div>
      ${e.url?`<a href="${esc(e.url)}" target="_blank" class="li-link">🔗 LinkedIn Profile</a>`:''}
    </div>
    <div class="drawer-section">
      <div class="drawer-sec-title">Company & Location</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Company</div><div class="info-value">${esc(e.company||'—')}</div></div>
        <div class="info-item"><div class="info-label">Industry</div><div class="info-value">${esc(e.industry||'—')}</div></div>
        <div class="info-item"><div class="info-label">Location</div><div class="info-value">${esc(e.location||'—')}</div></div>
        <div class="info-item"><div class="info-label">Reaction</div><div class="info-value">${esc(e.reaction||'—')}</div></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-sec-title">Post Engaged</div>
      <div class="drawer-snippet">${esc(post.snippet)}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">${esc(post.date)} · ${esc(post.author)}</div>
    </div>`;

  openDrawer();
}

function openPeopleDrawer(idx){
  const p=RAW.people[idx];
  const isDM=p.dm&&p.dm.toLowerCase()==='yes';

  document.getElementById('drawerHeader').innerHTML=`
    ${avatarHtml(p.name,'')}
    <div>
      <div class="drawer-name">${esc(p.name)}</div>
      <div class="drawer-sub">${esc(p.title||p.headline)}</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>`;

  const badges=[];
  if(isDM)badges.push('<span class="badge badge-dm">🎯 Decision Maker</span>');
  if(p.seniority)badges.push(`<span class="badge ${senBadgeClass(p.seniority)}">${esc(p.seniority)}</span>`);
  if(p.degree)badges.push(`<span class="badge badge-deg">${degLabel(p.degree)} degree</span>`);
  if(p.posts_engaged>0)badges.push(`<span class="badge badge-react">${p.posts_engaged} post${p.posts_engaged!==1?'s':''} engaged</span>`);

  document.getElementById('drawerBody').innerHTML=`
    <div class="drawer-section">
      <div class="tag-row">${badges.join('')}</div>
      ${p.url?`<a href="${esc(p.url)}" target="_blank" class="li-link">🔗 LinkedIn Profile</a>`:''}
    </div>
    <div class="drawer-section">
      <div class="drawer-sec-title">Profile</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Company</div><div class="info-value">${esc(p.company||'—')}</div></div>
        <div class="info-item"><div class="info-label">Industry</div><div class="info-value">${esc(p.industry||'—')}</div></div>
        <div class="info-item"><div class="info-label">Company Size</div><div class="info-value">${esc(p.size||'—')}</div></div>
        <div class="info-item"><div class="info-label">Location</div><div class="info-value">${esc(p.location||'—')}</div></div>
        <div class="info-item"><div class="info-label">Country</div><div class="info-value">${esc(p.country||'—')}</div></div>
        <div class="info-item"><div class="info-label">Connection</div><div class="info-value">${degLabel(p.degree)||'—'}</div></div>
      </div>
    </div>
    ${p.headline?`<div class="drawer-section"><div class="drawer-sec-title">Headline</div><div class="drawer-snippet">${esc(p.headline)}</div></div>`:''}`;

  openDrawer();
}

// ── INIT ──
renderPostTab();
renderPeopleTab();

// keyboard close
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
</script>
</body>
</html>
