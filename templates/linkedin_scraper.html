<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn ABM Intelligence — Position²</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--bg2:#0c0f1d;
  --card:rgba(255,255,255,0.04);--card-b:rgba(255,255,255,0.08);--card-h:rgba(255,255,255,0.07);
  --text:#eef0f8;--muted:#8892b0;--muted2:#4a5170;
  --green:#00e5a0;--glow-g:rgba(0,229,160,0.15);
  --indigo:#818cf8;--glow-i:rgba(129,140,248,0.15);
  --amber:#fbbf24;--glow-a:rgba(251,191,36,0.15);
  --cyan:#22d3ee;--glow-c:rgba(34,211,238,0.12);
  --purple:#c084fc;--glow-p:rgba(192,132,252,0.12);
  --pink:#f472b6;
}
html,body{height:100%;font-family:"Space Grotesk",sans-serif;font-size:14px;color:var(--text);overflow-x:hidden}
body{background:var(--bg);min-height:100vh}

/* AURORA */
.aurora{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.3;animation:drift linear infinite}
.orb1{width:700px;height:700px;top:-15%;left:-10%;background:radial-gradient(circle,rgba(0,229,160,.5),transparent 70%);animation-duration:28s}
.orb2{width:550px;height:550px;top:25%;right:-15%;background:radial-gradient(circle,rgba(129,140,248,.55),transparent 70%);animation-duration:33s;animation-delay:-9s}
.orb3{width:450px;height:450px;bottom:5%;left:15%;background:radial-gradient(circle,rgba(192,132,252,.4),transparent 70%);animation-duration:22s;animation-delay:-16s}
.orb4{width:380px;height:380px;top:55%;right:25%;background:radial-gradient(circle,rgba(34,211,238,.35),transparent 70%);animation-duration:38s;animation-delay:-6s}
.orb5{width:500px;height:500px;bottom:-12%;right:-8%;background:radial-gradient(circle,rgba(251,191,36,.28),transparent 70%);animation-duration:25s;animation-delay:-13s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}25%{transform:translate(70px,-50px) scale(1.06)}50%{transform:translate(-40px,90px) scale(0.94)}75%{transform:translate(-80px,-30px) scale(1.09)}100%{transform:translate(0,0) scale(1)}}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}

/* SHELL */
.shell{position:relative;z-index:1;min-height:100vh}

/* NAV */
.nav{display:flex;align-items:center;gap:14px;padding:0 28px;height:62px;border-bottom:1px solid var(--card-b);background:rgba(6,8,16,.88);backdrop-filter:blur(22px);position:sticky;top:0;z-index:100}
.nav-logo{font-size:17px;font-weight:700;background:linear-gradient(135deg,#fff 30%,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,229,160,.3);color:var(--green);background:var(--glow-g);font-weight:500;animation:pillglow 3s ease-in-out infinite}
@keyframes pillglow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(0,229,160,.2)}}
.nav-tabs{display:flex;gap:4px;margin-left:auto;background:rgba(255,255,255,.04);border:1px solid var(--card-b);border-radius:12px;padding:4px}
.ntab{padding:7px 18px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .25s;border:none;background:none;display:flex;align-items:center;gap:7px;font-family:inherit}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--text);background:rgba(255,255,255,.09)}
.ntab .tc{font-size:10px;background:var(--glow-i);border:1px solid rgba(129,140,248,.3);color:var(--indigo);padding:1px 7px;border-radius:10px;font-weight:700}

/* PAGES */
.page{display:none;padding:26px 28px;animation:fadeUp .3s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:22px}
.scard{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:all .3s;animation:cardIn .5s ease both}
.scard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:16px}
.scard:hover{transform:translateY(-3px) scale(1.02);border-color:rgba(255,255,255,.18)}
.scard:hover::before{opacity:1}
.scard.sg::before{background:radial-gradient(circle at 10% 10%,var(--glow-g),transparent 70%)}
.scard.si::before{background:radial-gradient(circle at 10% 10%,var(--glow-i),transparent 70%)}
.scard.sa::before{background:radial-gradient(circle at 10% 10%,var(--glow-a),transparent 70%)}
.scard.sc::before{background:radial-gradient(circle at 10% 10%,var(--glow-c),transparent 70%)}
.scard.sp::before{background:radial-gradient(circle at 10% 10%,var(--glow-p),transparent 70%)}
.scard.active-filter{border-color:var(--green)!important;box-shadow:0 0 20px rgba(0,229,160,.2)}
@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.sc-ico{font-size:20px;margin-bottom:8px}
.sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sc-val{font-size:30px;font-weight:700;line-height:1}
.vg{background:linear-gradient(135deg,var(--green),#00c8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.vi{background:linear-gradient(135deg,var(--indigo),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.va{background:linear-gradient(135deg,var(--amber),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.vc{background:linear-gradient(135deg,var(--cyan),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.vp{background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc-sub{font-size:10px;color:var(--muted2);margin-top:4px}
.sc-hint{font-size:9px;color:var(--muted2);margin-top:6px;opacity:0;transition:opacity .2s}
.scard:hover .sc-hint{opacity:1}

/* FILTER BAR */
.fbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:20px;padding:14px 18px;background:var(--card);border:1px solid var(--card-b);border-radius:16px;animation:cardIn .4s ease .05s both}
.fgroup{display:flex;align-items:center;gap:7px}
.flabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:20px;border:1px solid var(--card-b);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;font-weight:500}
.chip:hover{border-color:rgba(255,255,255,.2);color:var(--text);background:rgba(255,255,255,.07);transform:scale(1.04)}
.chip.on{border-color:var(--green);color:var(--green);background:var(--glow-g);box-shadow:0 0 10px rgba(0,229,160,.15)}
.chip.on-a{border-color:var(--amber);color:var(--amber);background:var(--glow-a)}
.chip.on-i{border-color:var(--indigo);color:var(--indigo);background:var(--glow-i)}
.sep{width:1px;height:24px;background:var(--card-b);flex-shrink:0}
.srch{position:relative;margin-left:auto}
.srch input{background:rgba(255,255,255,.05);border:1px solid var(--card-b);border-radius:10px;color:var(--text);font-size:13px;padding:8px 14px 8px 34px;font-family:inherit;width:210px;outline:none;transition:all .25s}
.srch input:focus{border-color:rgba(129,140,248,.5);background:rgba(129,140,248,.07);box-shadow:0 0 0 3px rgba(129,140,248,.1)}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* SEC HEADER */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-ttl{font-size:15px;font-weight:600}
.sec-cnt{font-size:11px;background:var(--card);border:1px solid var(--card-b);border-radius:20px;padding:2px 10px;color:var(--muted);font-weight:600}

/* POST CARDS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:16px}
.pcard{background:var(--card);border:1px solid var(--card-b);border-radius:18px;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1);animation:cardIn .5s ease both}
.pcard:hover{border-color:rgba(255,255,255,.16);box-shadow:0 10px 44px rgba(0,0,0,.45);transform:translateY(-3px)}
.ph{padding:20px 20px 16px;cursor:pointer}
.ptop{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pauth{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px 3px 6px;border-radius:20px;border:1px solid rgba(0,229,160,.3);color:var(--green);background:var(--glow-g)}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pdate{font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);padding:3px 9px;border-radius:20px;border:1px solid var(--card-b)}
.psnip{font-size:13.5px;line-height:1.65;color:var(--text);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;opacity:.9}
.pcard.expanded .psnip{-webkit-line-clamp:unset}
.pmets{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mpill{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;transition:transform .2s}
.mpill:hover{transform:scale(1.05)}
.mp-g{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--green)}
.mp-a{background:var(--glow-a);border:1px solid rgba(251,191,36,.3);color:var(--amber)}
.mp-p{background:var(--glow-p);border:1px solid rgba(192,132,252,.3);color:var(--purple)}
.mp-c{background:var(--glow-c);border:1px solid rgba(34,211,238,.25);color:var(--cyan)}
.expbtn{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--card-b);border-radius:8px;padding:4px 10px;cursor:pointer;transition:all .2s;font-family:inherit}
.expbtn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.vlink{font-size:11px;color:var(--indigo);text-decoration:none;transition:color .2s;padding:4px}
.vlink:hover{color:var(--text)}

/* ENGAGER LIST */
.elist{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.elist.open{max-height:560px;overflow-y:auto}
.elist::-webkit-scrollbar{width:3px}
.elist::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:4px}
.el-hdr{display:grid;grid-template-columns:36px 1fr auto;gap:10px;padding:9px 20px 7px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);border-top:1px solid var(--card-b);background:rgba(255,255,255,.02)}
.eitem{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:10px 20px;cursor:pointer;transition:background .15s;border-top:1px solid rgba(255,255,255,.025);animation:slideIn .3s ease both}
.eitem:hover{background:rgba(255,255,255,.04)}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.eavtr{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--green));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;transition:transform .2s}
.eitem:hover .eavtr{transform:scale(1.1) rotate(-4deg)}
.eavtr img{width:100%;height:100%;object-fit:cover}
.ename{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ebadges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}

/* BADGES */
.b{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap}
.bdm{background:var(--glow-a);color:var(--amber);border:1px solid rgba(251,191,36,.35)}
.bcs{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.bvp{background:var(--glow-i);color:var(--indigo);border:1px solid rgba(129,140,248,.3)}
.bmg{background:var(--glow-g);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.bic{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--card-b)}
.blike{background:var(--glow-g);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.bprs{background:var(--glow-a);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.bint{background:var(--glow-c);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}
.bapp{background:var(--glow-p);color:var(--purple);border:1px solid rgba(192,132,252,.25)}
.bemp{background:rgba(244,114,182,.1);color:var(--pink);border:1px solid rgba(244,114,182,.25)}
.bdeg{background:rgba(34,211,238,.08);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.bcmp{background:rgba(129,140,248,.08);color:var(--indigo);border:1px solid rgba(129,140,248,.2)}

/* PEOPLE PAGE - Sub-tabs */
.sub-tabs{display:flex;gap:6px;margin-bottom:20px;animation:cardIn .4s ease both}
.stab{padding:8px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .25s;border:1px solid transparent;background:var(--card);font-family:inherit;display:flex;align-items:center;gap:7px}
.stab:hover{color:var(--text);border-color:var(--card-b)}
.stab.active{color:var(--text);border-color:rgba(129,140,248,.4);background:var(--glow-i);box-shadow:0 0 20px rgba(129,140,248,.1)}
.stab .tc{font-size:10px;background:rgba(255,255,255,.08);color:var(--muted);padding:1px 6px;border-radius:8px;font-weight:700}
.subpage{display:none}.subpage.active{display:block;animation:fadeUp .3s ease}

/* PEOPLE LAYOUT */
.peoplayout{display:grid;grid-template-columns:1fr 270px;gap:20px;align-items:start}
@media(max-width:900px){.peoplayout{grid-template-columns:1fr}}

/* BUCKET */
.bsect{margin-bottom:22px}
.bhdr{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;background:var(--card);border:1px solid var(--card-b);width:100%;margin-bottom:10px;cursor:pointer;transition:all .25s;font-family:inherit}
.bhdr:hover{background:var(--card-h);border-color:rgba(255,255,255,.14)}
.bico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.binfo{text-align:left;flex:1}
.bname{font-size:14px;font-weight:600}
.bsub{font-size:11px;color:var(--muted);margin-top:1px}
.bchev{color:var(--muted);font-size:12px;transition:transform .25s}
.bchev.up{transform:rotate(180deg)}
.bbody{overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.bbody.closed{max-height:0!important}

.pgrd{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.pcrd{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:16px;cursor:pointer;transition:all .3s;animation:cardIn .4s ease both;position:relative;overflow:hidden}
.pcrd::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:16px;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.05),transparent 60%)}
.pcrd:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.35)}
.pcrd:hover::after{opacity:1}
.pctop{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.pcav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;transition:transform .25s;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:hidden}
.pcrd:hover .pcav{transform:scale(1.1) rotate(-4deg)}
.pcav img{width:100%;height:100%;object-fit:cover}
.pcn{font-size:13px;font-weight:600;line-height:1.3}
.pct{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pcbdg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pcmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pcmi{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;overflow:hidden}
.pcmi span{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.actbar{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--card-b)}
.acttrack{height:3px;flex:1;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.actfill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:2px;transition:width .8s ease}
.actlbl{font-size:10px;color:var(--muted);white-space:nowrap}

/* COMPANIES TAB */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.ccrd{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:18px;cursor:pointer;transition:all .3s;animation:cardIn .5s ease both;position:relative;overflow:hidden}
.ccrd:hover{border-color:rgba(255,255,255,.16);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.ccrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--indigo),var(--green));opacity:0;transition:opacity .3s}
.ccrd:hover::before{opacity:1}
.cctop{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.ccico{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--indigo),var(--green));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;transition:transform .2s}
.ccrd:hover .ccico{transform:scale(1.08) rotate(-5deg)}
.ccn{font-size:14px;font-weight:600;line-height:1.3}
.ccsub{font-size:11px;color:var(--muted);margin-top:2px}
.cc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cc-stat{background:rgba(255,255,255,.04);border:1px solid var(--card-b);border-radius:10px;padding:10px 12px;text-align:center}
.cc-stat-val{font-size:22px;font-weight:700}
.cc-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.cc-bar{display:flex;gap:3px;height:6px;border-radius:3px;overflow:hidden;margin-bottom:10px}
.cc-bar-seg{height:100%;transition:width .8s ease}
.cc-ppl{display:flex;gap:-6px;margin-top:10px}
.mini-av{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg2);background:linear-gradient(135deg,var(--indigo),var(--green));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-left:-8px;flex-shrink:0;overflow:hidden;transition:margin .2s}
.mini-av:first-child{margin-left:0}
.ccrd:hover .mini-av{margin-left:-2px}
.cc-more{font-size:11px;color:var(--muted);align-self:center;margin-left:6px}

/* LEADERBOARD */
.lbcard{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:16px;position:sticky;top:78px;animation:cardIn .5s ease .15s both}
.lbtitle{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.lbitem{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s}
.lbitem:hover{padding-left:4px}
.lbitem:last-child{border-bottom:none}
.lbrank{font-size:11px;color:var(--muted2);width:16px;text-align:center;font-weight:700;flex-shrink:0}
.rank-g{color:var(--amber)}.rank-s{color:#94a3b8}.rank-b{color:#cd7c3f}
.lbname{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbtrack{width:50px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;flex-shrink:0}
.lbfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 1s ease}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(10px)}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;height:100vh;width:490px;max-width:100vw;background:rgba(8,10,22,.97);border-left:1px solid var(--card-b);z-index:201;transform:translateX(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;backdrop-filter:blur(24px)}

.drawer::-webkit-scrollbar{width:3px}
.drawer::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:4px}
.dhdr{padding:22px 22px 18px;border-bottom:1px solid var(--card-b);position:sticky;top:0;background:rgba(8,10,22,.97);z-index:10;display:flex;align-items:flex-start;gap:14px}
.dav{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dav img{width:100%;height:100%;object-fit:cover}
.dname{font-size:18px;font-weight:700;line-height:1.25;margin-bottom:2px}
.dsub{font-size:12px;color:var(--muted);line-height:1.4}
.dclose{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid var(--card-b);color:var(--muted);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dclose:hover{background:rgba(255,255,255,.1);color:var(--text)}
.dbody{padding:20px}
.dsec{margin-bottom:20px}
.dslbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);margin-bottom:10px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ibox{background:rgba(255,255,255,.04);border:1px solid var(--card-b);border-radius:10px;padding:12px}
.ilbl{font-size:10px;color:var(--muted2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.ival{font-size:13px;font-weight:500}
.snippetbox{font-size:13.5px;line-height:1.7;background:rgba(255,255,255,.03);border:1px solid var(--card-b);border-radius:12px;padding:15px;border-left:3px solid var(--indigo)}
.lilink{display:inline-flex;align-items:center;gap:6px;color:var(--indigo);text-decoration:none;font-size:13px;padding:7px 13px;border:1px solid rgba(129,140,248,.3);border-radius:9px;transition:all .2s;margin-top:6px;font-weight:500}
.lilink:hover{background:var(--glow-i);color:var(--text)}
.tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}

/* company drawer people list */
.dplist{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.dplist::-webkit-scrollbar{width:3px}
.dpitem{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.04);border:1px solid var(--card-b);border-radius:10px;cursor:pointer;transition:background .15s}
.dpitem:hover{background:rgba(255,255,255,.08)}

/* NO RESULTS */
.nores{text-align:center;padding:60px 20px;color:var(--muted);animation:fadeUp .3s ease}
.nores-ico{font-size:48px;margin-bottom:12px;opacity:.5}

/* SPINNER */
.scard:nth-child(1){animation-delay:.04s}.scard:nth-child(2){animation-delay:.08s}.scard:nth-child(3){animation-delay:.12s}.scard:nth-child(4){animation-delay:.16s}.scard:nth-child(5){animation-delay:.2s}
.pcard:nth-child(1){animation-delay:.04s}.pcard:nth-child(2){animation-delay:.08s}.pcard:nth-child(3){animation-delay:.12s}.pcard:nth-child(4){animation-delay:.16s}.pcard:nth-child(5){animation-delay:.2s}
</style>

/* ── helpers ── */
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ini=n=>(n||'?').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
const GRAD=[['#6366f1','#22d3ee'],['#8b5cf6','#06b6d4'],['#059669','#818cf8'],['#d97706','#f472b6'],['#0ea5e9','#a78bfa'],['#10b981','#f59e0b']];
function gradFor(name){const i=Math.abs((name||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0))%GRAD.length;return GRAD[i]}
function av(name,pic,sz,cls){
  const s=sz||44,c=cls||'pcav';
  if(pic&&pic.startsWith('http'))return`<div class="${c}" style="width:${s}px;height:${s}px"><img src="${esc(pic)}" alt="" onerror="this.parentElement.innerHTML='${ini(name)}'"></div>`;
  const [c1,c2]=gradFor(name);
  return`<div class="${c}" style="width:${s}px;height:${s}px;background:linear-gradient(135deg,${c1},${c2})">${ini(name)}</div>`;
}
const RICO={LIKE:'👍',PRAISE:'🙌',INTEREST:'🤔',APPRECIATION:'❤️',EMPATHY:'🫂'};
const RCLS={LIKE:'blike',PRAISE:'bprs',INTEREST:'bint',APPRECIATION:'bapp',EMPATHY:'bemp'};
const SCLS=s=>!s?'bic':s.includes('C-Level')||s.includes('Founder')?'bcs':s.includes('VP')?'bvp':s.includes('Director')?'bvp':s.includes('Manager')?'bmg':'bic';
const SLBL=s=>(s||'Unknown').replace('IC / Individual Contributor','IC').replace('C-Level / Founder','C-Level');
const DLBL=d=>d?d.replace('SECOND_DEGREE','2nd').replace('THIRD_DEGREE','3rd').replace('FIRST_DEGREE','1st'):'';

let PF={sen:'all',dm:false,deg:'all',react:'all',q:''};
let PLF={sen:'all',dm:false,deg:'all',minP:0,country:'all',q:''};
let CF={q:'',dm:false,minPpl:0};

/* ── counter animation ── */
function countUp(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    const t=parseInt(el.dataset.count)||0;let s=0;const inc=t/600*16;
    const run=()=>{s=Math.min(s+inc,t);el.textContent=Math.round(s);if(s<t)requestAnimationFrame(run)};
    requestAnimationFrame(run);
  });
}

/* ── tab switch ── */
function switchTab(t){
  ['post','people'].forEach(k=>{
    document.getElementById('tab-'+k).classList.toggle('active',k===t);
    document.getElementById('nt-'+k).classList.toggle('active',k===t);
  });
  setTimeout(countUp,50);
}

  document.querySelectorAll('.scard').forEach(c=>c.classList.remove('active-filter'));
  if(activeStatFilter===mode){activeStatFilter=null;PF.dm=false;PF.sen='all';document.getElementById('pf-dm').classList.remove('on');resetChips('pf-sen');return applyPF();}
  activeStatFilter=mode;
  el.classList.add('active-filter');
  if(mode==='dm'){PF.dm=true;document.getElementById('pf-dm').classList.add('on');}
  else if(mode==='csuite'){PF.sen='C-Level / Founder';setActiveChip('pf-sen','C-Level / Founder');}
  else{PF.dm=false;PF.sen='all';}
  applyPF();
}

function setActiveChip(id,val){const g=document.getElementById(id);if(!g)return;g.querySelectorAll('.chip').forEach(c=>{c.classList.toggle('on',c.textContent.includes(val.replace('IC / Individual Contributor','IC').replace('C-Level / Founder','C-Level')))});}

function setPF(key,val,el){

}

function applyPF(){
  const g=document.getElementById('pgrid');if(!g)return;
  const {sen,dm,deg,react,q}=PF;const ql=q.toLowerCase();
  const filtered=D.posts.map(p=>{
    let eng=p.engagers.filter(e=>{
      if(sen!=='all'&&e.seniority!==sen)return false;
      if(dm&&e.dm?.toLowerCase()!=='yes')return false;
      if(deg!=='all'&&e.degree!==deg)return false;
      if(react!=='all'&&e.reaction!==react)return false;
      if(ql){const match=e.name.toLowerCase().includes(ql)||e.company.toLowerCase().includes(ql)||e.title.toLowerCase().includes(ql);if(!match&&!p.snippet.toLowerCase().includes(ql))return false;}
      return true;
    });
    if(ql&&p.snippet.toLowerCase().includes(ql)&&!eng.length)eng=p.engagers;
    return{...p,fe:eng};
  }).filter(p=>p.fe.length>0);
  document.getElementById('pst-cnt').textContent=filtered.length+' posts';
  document.getElementById('tc-post').textContent=filtered.length;
  if(!filtered.length){g.innerHTML='<div class="nores" style="grid-column:1/-1"><div class="nores-ico">🔍</div><h3>No results</h3><p>Try adjusting filters</p></div>';return;}
  g.innerHTML=filtered.map((p,pi)=>{
    const eng=p.fe,dmN=eng.filter(e=>e.dm?.toLowerCase()==='yes').length;
    const csN=eng.filter(e=>e.seniority?.includes('C-Level')||e.seniority?.includes('Founder')).length;
    const reacts=[...new Set(eng.map(e=>e.reaction).filter(Boolean))].slice(0,2);
    const ori=D.posts.indexOf(p);
    return`<div class="pcard" id="pc-${pi}" style="animation-delay:${pi*.05}s">
      <div class="ph" onclick="togglePost(${pi})">
        <div class="ptop">
          <div class="pauth"><div class="pdot"></div>${esc(p.author||'Position²')}</div>
          <div class="pdate">📅 ${esc(p.date)}</div>
        </div>
        <div class="psnip">${esc(p.snippet)}</div>
        <div class="pmets">
          <div class="mpill mp-g" onclick="event.stopPropagation()">✨ ${eng.length} engager${eng.length!==1?'s':''}</div>
          ${dmN?`<div class="mpill mp-a" onclick="event.stopPropagation();filterToDM(${ori})">🎯 ${dmN} DM${dmN!==1?'s':''}</div>`:''}
          ${csN?`<div class="mpill mp-p" onclick="event.stopPropagation()">👑 ${csN} C-Suite</div>`:''}
          ${reacts.map(r=>`<div class="mpill mp-c" onclick="event.stopPropagation()">${RICO[r]||''} ${r.charAt(0)+r.slice(1).toLowerCase()}</div>`).join('')}
          ${p.url?`<a href="${esc(p.url)}" target="_blank" class="vlink" onclick="event.stopPropagation()" title="View post">↗</a>`:''}
          <button class="expbtn" id="eb-${pi}" onclick="event.stopPropagation();togglePost(${pi})">Show ▾</button>
        </div>
      </div>
      <div class="elist" id="el-${pi}">
        <div class="el-hdr"><div></div><div>Engager</div><div>Signal</div></div>
        ${eng.map((e,ei)=>{const oi=p.engagers.indexOf(e);return`
        <div class="eitem" onclick="openEngDrawer(${ori},${oi})" style="animation-delay:${ei*.035}s">
          ${av(e.name,e.pic,36,'eavtr')}
          <div><div class="ename">${esc(e.name)}</div><div class="esub">${esc(e.title||e.headline)}${e.company?' · '+esc(e.company):''}</div></div>
          <div class="ebadges">
            ${e.dm?.toLowerCase()==='yes'?'<span class="b bdm">🎯 DM</span>':''}
            ${e.seniority?`<span class="b ${SCLS(e.seniority)}">${esc(SLBL(e.seniority))}</span>`:''}
            ${e.reaction?`<span class="b ${RCLS[e.reaction]||'bic'}">${RICO[e.reaction]||''} ${e.reaction.charAt(0)+e.reaction.slice(1).toLowerCase()}</span>`:''}
            ${e.degree?`<span class="b bdeg">${DLBL(e.degree)}</span>`:''}
          </div>
        </div>`}).join('')}
      </div>
    </div>`;
  }).join('');
}

function openPersonDrawer(idx){
  const p=D.people[idx];if(!p)return;
  const isDM=p.dm?.toLowerCase()==='yes';
  const pct=Math.round(p.posts_engaged/maxP*100);
  document.getElementById('dhdr').innerHTML=`
    ${av(p.name,'',58,'dav')}
    <div style="flex:1"><div class="dname">${esc(p.name)}</div><div class="dsub">${esc(p.title||p.headline)}</div>
    ${p.url?`<a href="${esc(p.url)}" target="_blank" class="lilink">🔗 LinkedIn Profile</a>`:''}</div>
    <button class="dclose" onclick="closeDrawer()">✕</button>`;
  const badges=[
    isDM?'<span class="b bdm" style="font-size:12px;padding:4px 11px">🎯 Decision Maker</span>':'',
    p.seniority?`<span class="b ${SCLS(p.seniority)}" style="font-size:12px;padding:4px 11px">${esc(SLBL(p.seniority))}</span>`:'',
    p.degree?`<span class="b bdeg" style="font-size:12px;padding:4px 11px">${DLBL(p.degree)} degree</span>`:'',
    p.posts_engaged>0?`<span class="b bmg" style="font-size:12px;padding:4px 11px">⚡ ${p.posts_engaged} post${p.posts_engaged!==1?'s':''}</span>`:'',
  ].filter(Boolean);
  document.getElementById('dbody').innerHTML=`
    <div class="dsec"><div class="tagrow">${badges.join('')}</div></div>
    ${p.posts_engaged>0?`<div class="dsec"><div class="dslbl">Engagement Activity</div>
      <div style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--card-b);border-radius:10px">
        <div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">Relative activity vs. most active person</div>
          <div class="acttrack" style="height:5px"><div class="actfill" style="width:${pct}%"></div></div>
        </div>
        <div style="font-size:26px;font-weight:700;color:var(--green)">${p.posts_engaged}</div>
      </div>
    </div>`:''}
    <div class="dsec"><div class="dslbl">Profile Details</div>
      <div class="igrid">
        <div class="ibox"><div class="ilbl">Company</div><div class="ival">${esc(p.company||'—')}</div></div>
        <div class="ibox"><div class="ilbl">Industry</div><div class="ival">${esc(p.industry||'—')}</div></div>
        <div class="ibox"><div class="ilbl">Company Size</div><div class="ival">${esc(p.size||'—')}</div></div>
        <div class="ibox"><div class="ilbl">Location</div><div class="ival">${esc(p.location||'—')}</div></div>
        <div class="ibox"><div class="ilbl">Country</div><div class="ival">${esc(p.country||'—')}</div></div>
        <div class="ibox"><div class="ilbl">Connection</div><div class="ival">${DLBL(p.degree)||'—'}</div></div>
      </div>
    </div>
    ${p.headline&&p.headline!==p.title?`<div class="dsec"><div class="dslbl">Headline</div><div class="snippetbox">${esc(p.headline)}</div></div>`:''}`;
  openDrawer();
}

function openCompanyDrawer(idx){
  const c=D.companies[idx];if(!c)return;
  const SEN_C=['C-Level / Founder','VP','Director','Manager','IC / Individual Contributor'];
  const SEN_COLS=['#fbbf24','#818cf8','#818cf8','#00e5a0','#94a3b8'];
  const [cc1,cc2]=gradFor(c.name);
  document.getElementById('dhdr').innerHTML=`
    <div class="dav" style="border-radius:14px;background:linear-gradient(135deg,${cc1},${cc2})">${ini(c.name)}</div>
    <div style="flex:1"><div class="dname">${esc(c.name)}</div><div class="dsub">${esc(c.industry||'—')} ${c.size?'· '+esc(c.size)+' employees':''}</div></div>
    <button class="dclose" onclick="closeDrawer()">✕</button>`;
  const total=c.people_count||1;
  const senBars=SEN_C.map((s,i)=>{const cnt=c.seniority_map[s]||0;if(!cnt)return'';return`<div class="cc-bar-seg" style="width:${Math.round(cnt/total*100)}%;background:${SEN_COLS[i]};height:8px"></div>`;}).join('');
  const senBreakdown=SEN_C.map((s,i)=>{const cnt=c.seniority_map[s]||0;if(!cnt)return'';return`<div class="ibox"><div class="ilbl">${s}</div><div class="ival" style="color:${SEN_COLS[i]}">${cnt}</div></div>`;}).join('');
  const pplHtml=c.people.map((p,pi)=>{
    const pidx=D.people.indexOf(p);
    return`<div class="dpitem" onclick="closeDrawer();setTimeout(()=>openPersonDrawer(${pidx}),200)">
      ${av(p.name,'',32,'pcav')}
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(p.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(p.title||p.headline)}</div></div>
      <div style="display:flex;gap:4px">
        ${p.dm?.toLowerCase()==='yes'?'<span class="b bdm">🎯</span>':''}
        ${p.seniority?`<span class="b ${SCLS(p.seniority)}">${esc(SLBL(p.seniority))}</span>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('dbody').innerHTML=`
    <div class="dsec">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="cc-stat" style="background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.15);border-radius:12px;padding:16px">
          <div class="cc-stat-val vg">${c.people_count}</div><div class="cc-stat-lbl">People</div>
        </div>
        <div class="cc-stat" style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:12px;padding:16px">
          <div class="cc-stat-val va">${c.dm_count}</div><div class="cc-stat-lbl">Decision Makers</div>
        </div>
      </div>
      <div class="dslbl">Seniority Distribution</div>
      <div class="cc-bar" style="height:8px;border-radius:4px;margin-bottom:12px">${senBars}</div>
      <div class="igrid">${senBreakdown}</div>
    </div>
    ${c.posts_engaged?`<div class="dsec"><div class="dslbl">Post Engagement</div>
      <div class="ibox"><div class="ilbl">Posts Engaged With</div><div class="ival" style="color:var(--green);font-size:20px">${c.posts_engaged}</div></div>
    </div>`:''}
    <div class="dsec"><div class="dslbl">People from this Company (${c.people_count})</div>
      <div class="dplist">${pplHtml}</div>
    </div>`;
  openDrawer();
}
function openCompanyDrawerByName(name){
  const idx=D.companies.findIndex(c=>c.name===name);
  if(idx>=0)openCompanyDrawer(idx);
}
