<!-- ── PPC AI Chat Widget v3 ───────────────────────────────────────────────── -->
<style>
/* ── Root vars ─────────────────────────────────────────────────────────────── */
:root {
  --ppc-indigo: #6366f1; --ppc-purple: #8b5cf6; --ppc-cyan: #06b6d4;
  --ppc-panel-bg: rgba(7,9,22,0.97);
  --ppc-border-radius: 22px;
}

/* ── Trigger button ─────────────────────────────────────────────────────────── */
#ppc-wrap { position:fixed; bottom:28px; right:28px; z-index:10000; }

#ppc-btn {
  position:relative; width:60px; height:60px; border-radius:50%;
  border:none; cursor:pointer;
  background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 60%,#a78bfa 100%);
  display:flex; align-items:center; justify-content:center;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
  box-shadow:0 8px 32px rgba(99,102,241,.5);
  animation:ppc-pulse 3s ease-in-out infinite;
}
#ppc-btn::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:conic-gradient(from 0deg,#6366f1,#a78bfa,#06b6d4,#8b5cf6,#6366f1);
  animation:ppc-ring-spin 4s linear infinite; z-index:-1;
  opacity:.55; filter:blur(2px);
}
#ppc-btn:hover { transform:scale(1.12); box-shadow:0 12px 40px rgba(99,102,241,.7); }
#ppc-btn.open  { opacity:0; pointer-events:none; transform:scale(.8); }
@keyframes ppc-pulse {
  0%,100%{box-shadow:0 8px 32px rgba(99,102,241,.5),0 0 0 0 rgba(99,102,241,.35)}
  50%     {box-shadow:0 8px 32px rgba(99,102,241,.5),0 0 0 12px rgba(99,102,241,0)}
}
@keyframes ppc-ring-spin { to{transform:rotate(360deg)} }

/* Icon swap */
.ppc-ico{position:absolute;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
#ppc-ico-chat {opacity:1;transform:scale(1) rotate(0)}
#ppc-ico-close{opacity:0;transform:scale(.3) rotate(-90deg)}
#ppc-btn.open #ppc-ico-chat {opacity:0;transform:scale(.3) rotate(90deg)}
#ppc-btn.open #ppc-ico-close{opacity:1;transform:scale(1) rotate(0)}

/* Tooltip */
#ppc-tip {
  position:absolute; bottom:calc(100% + 12px); right:0; white-space:nowrap;
  background:rgba(8,10,28,.97); border:1px solid rgba(99,102,241,.35);
  color:#c7d2fe; font-size:11.5px; font-weight:600;
  font-family:'Space Grotesk',sans-serif;
  padding:5px 12px; border-radius:9px;
  opacity:0; transform:translateY(6px) scale(.96);
  transition:all .2s; pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#ppc-wrap:hover #ppc-tip{opacity:1;transform:translateY(0) scale(1)}

/* ── Panel wrapper ────────────────────────────────────────────────────────── */
#ppc-border {
  position:fixed; bottom:102px; right:28px; z-index:9999;
  width:400px; border-radius:var(--ppc-border-radius); padding:1.5px;
  background:linear-gradient(135deg,rgba(99,102,241,.8),rgba(139,92,246,.65),rgba(6,182,212,.5),rgba(99,102,241,.8));
  background-size:300% 300%; animation:ppc-grad 5s ease infinite;
  opacity:0; transform:translateY(20px) scale(.94); pointer-events:none;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s,
             top .4s cubic-bezier(.34,1.56,.64,1), bottom .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 32px 80px rgba(0,0,0,.75),0 0 80px rgba(99,102,241,.12),inset 0 1px 0 rgba(255,255,255,.06);
}
#ppc-border.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
/* Expanded: anchor top + bottom so panel fills full height */
#ppc-border.expanded{top:12px;bottom:12px;height:auto}
#ppc-border.expanded #ppc-panel{height:100%}
@keyframes ppc-grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@media(max-width:480px){
  #ppc-border{width:calc(100vw - 16px)!important;right:8px;bottom:82px}
  #ppc-wrap{right:14px;bottom:14px}
}

/* ── Inner panel ──────────────────────────────────────────────────────────── */
#ppc-panel {
  border-radius:calc(var(--ppc-border-radius) - 1.5px);
  background:var(--ppc-panel-bg);
  backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
  font-family:'Space Grotesk',sans-serif;
  height:560px;
  transition:height .35s cubic-bezier(.34,1.56,.64,1);
}
/* expanded panel height controlled by #ppc-border top/bottom anchoring */

/* Orbs */
#ppc-panel::before{
  content:'';position:absolute;top:-100px;left:-100px;
  width:320px;height:320px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(99,102,241,.13) 0%,transparent 70%);
  animation:ppc-orb1 8s ease-in-out infinite;
}
#ppc-panel::after{
  content:'';position:absolute;bottom:-80px;right:-80px;
  width:260px;height:260px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(139,92,246,.10) 0%,transparent 70%);
  animation:ppc-orb2 11s ease-in-out infinite;
}
@keyframes ppc-orb1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,15px) scale(1.08)}}
@keyframes ppc-orb2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,-20px) scale(1.06)}}

/* ── Header ───────────────────────────────────────────────────────────────── */
#ppc-hdr {
  flex-shrink:0; padding:16px 14px 0;
  position:relative; z-index:1;
  background:linear-gradient(180deg,rgba(99,102,241,.07) 0%,transparent 100%);
  border-bottom:1px solid rgba(255,255,255,.055);
  padding-bottom:12px;
}
.ppc-hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}

/* Avatar */
.ppc-av{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 0 3px rgba(99,102,241,.2),0 6px 20px rgba(99,102,241,.4);
  animation:ppc-av-glow 3.5s ease-in-out infinite;
}
@keyframes ppc-av-glow{
  0%,100%{box-shadow:0 0 0 3px rgba(99,102,241,.2),0 6px 20px rgba(99,102,241,.4)}
  50%     {box-shadow:0 0 0 5px rgba(99,102,241,.3),0 6px 28px rgba(99,102,241,.6)}
}

.ppc-hdr-info{flex:1;min-width:0}
.ppc-hdr-title{font-size:14.5px;font-weight:700;color:#f1f5f9;line-height:1;margin-bottom:4px;letter-spacing:-.01em}
.ppc-hdr-status{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#64748b}
.ppc-live{width:6px;height:6px;border-radius:50%;background:#10b981;flex-shrink:0;animation:ppc-live-pulse 2s infinite}
@keyframes ppc-live-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(16,185,129,0)}}

/* Header buttons */
.ppc-hdr-btns{display:flex;gap:5px;flex-shrink:0}
.ppc-hbtn{
  width:30px;height:30px;border:none;border-radius:9px;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  color:#475569;display:flex;align-items:center;justify-content:center;
  transition:all .18s; flex-shrink:0;
}
.ppc-hbtn:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#a5b4fc}

/* Data pills */
#ppc-pills{display:flex;gap:5px;flex-wrap:wrap}
.ppc-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3.5px 9px;border-radius:999px;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);cursor:default;
}
.ppc-pill-v{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.22);color:#6ee7b7}
.ppc-pill-s{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#fcd34d}
.ppc-pill-a{background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.22); color:#fca5a5}
.ppc-pill:hover{transform:scale(1.05);filter:brightness(1.2)}

/* ── Messages ──────────────────────────────────────────────────────────────── */
#ppc-msgs{
  flex:1;overflow-y:auto;padding:14px 13px 8px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;position:relative;z-index:1;
}
#ppc-msgs::-webkit-scrollbar{width:2px}
#ppc-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* Scroll-to-bottom button */
#ppc-scroll-btn{
  position:absolute;bottom:80px;right:18px;z-index:10;
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(99,102,241,.3);
  background:rgba(13,16,36,.95);color:#818cf8;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .2s;
  animation:ppc-bounce-down 1.2s ease-in-out infinite;
}
#ppc-scroll-btn:hover{background:rgba(99,102,241,.2);transform:scale(1.1)}
#ppc-scroll-btn.show{display:flex}
@keyframes ppc-bounce-down{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* ── Welcome screen ────────────────────────────────────────────────────────── */
#ppc-welcome{
  display:flex;flex-direction:column;align-items:center;
  padding:16px 6px 10px;text-align:center;
}
.ppc-orb-wrap{position:relative;margin-bottom:16px}
.ppc-wlc-orb{
  width:62px;height:62px;border-radius:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 8px 32px rgba(99,102,241,.5),0 0 0 6px rgba(99,102,241,.1);
  animation:ppc-orb-float 4s ease-in-out infinite;
}
@keyframes ppc-orb-float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.ppc-orb-ring{
  position:absolute;inset:-8px;border-radius:28px;
  border:1.5px solid rgba(99,102,241,.25);
  animation:ppc-ring-expand 3s ease-in-out infinite;
}
.ppc-orb-ring2{
  position:absolute;inset:-16px;border-radius:36px;
  border:1px solid rgba(99,102,241,.12);
  animation:ppc-ring-expand 3s ease-in-out infinite .5s;
}
@keyframes ppc-ring-expand{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:.3;transform:scale(1.05)}}

.ppc-wlc-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:5px;letter-spacing:-.02em}
.ppc-wlc-sub{font-size:12px;color:#475569;line-height:1.65;margin-bottom:18px;max-width:280px}

/* Suggestion chips */
.ppc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.ppc-chip{
  font-size:11.5px;font-weight:500;padding:10px 11px;border-radius:13px;
  cursor:pointer;text-align:left;line-height:1.4;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.ppc-chip:hover{
  background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.4);
  color:#c7d2fe;transform:translateY(-3px) scale(1.01);
  box-shadow:0 8px 24px rgba(99,102,241,.2);
}
.ppc-chip:active{transform:translateY(0) scale(.98)}
.ppc-chip-ico{display:block;font-size:18px;margin-bottom:4px}

/* ── Message rows ──────────────────────────────────────────────────────────── */
.ppc-row{display:flex;gap:9px;animation:ppc-msg-in .32s cubic-bezier(.34,1.56,.64,1) both}
@keyframes ppc-msg-in{from{opacity:0;transform:translateY(14px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.ppc-row.user{flex-direction:row-reverse}

.ppc-row-av{
  width:30px;height:30px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;align-self:flex-end;transition:transform .2s;
}
.ppc-row:hover .ppc-row-av{transform:scale(1.1)}
.ppc-row.assistant .ppc-row-av{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  box-shadow:0 2px 10px rgba(99,102,241,.4);
}
.ppc-row.user .ppc-row-av{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  font-size:10px;font-weight:700;color:#94a3b8;
}

.ppc-bwrap{display:flex;flex-direction:column;max-width:82%}
.ppc-row.user .ppc-bwrap{align-items:flex-end}

.ppc-bubble{padding:10px 14px;border-radius:17px;font-size:13px;line-height:1.72;position:relative}
.ppc-row.assistant .ppc-bubble{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-left:2.5px solid #6366f1;
  color:#cbd5e1;border-bottom-left-radius:5px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.ppc-row.user .ppc-bubble{
  background:linear-gradient(135deg,rgba(99,102,241,.24),rgba(139,92,246,.18));
  border:1px solid rgba(99,102,241,.32);
  color:#c7d2fe;border-bottom-right-radius:5px;
  box-shadow:0 2px 16px rgba(99,102,241,.15);
}
.ppc-bubble strong{color:#f1f5f9;font-weight:700}
.ppc-bubble ul{margin:5px 0 2px 16px;padding:0}
.ppc-bubble li{margin-bottom:3px;color:#94a3b8}
.ppc-bubble li strong{color:#e2e8f0}
.ppc-bubble p{margin:3px 0}
.ppc-bubble p:first-child{margin-top:0}
.ppc-bubble p:last-child{margin-bottom:0}

.ppc-ts{font-size:9.5px;color:rgba(255,255,255,.15);margin-top:3px;padding:0 3px;letter-spacing:.01em}

/* ── Typing animation ──────────────────────────────────────────────────────── */
.ppc-typing{display:flex;align-items:center;gap:10px;padding:10px 14px}
.ppc-wave{display:flex;gap:3px;align-items:center}
.ppc-wave span{
  display:block;width:4px;border-radius:4px;
  background:linear-gradient(180deg,#a78bfa,#6366f1);
  animation:ppc-wave-anim 1s ease-in-out infinite;
}
.ppc-wave span:nth-child(1){height:6px;animation-delay:0s}
.ppc-wave span:nth-child(2){height:12px;animation-delay:.1s}
.ppc-wave span:nth-child(3){height:8px;animation-delay:.2s}
.ppc-wave span:nth-child(4){height:15px;animation-delay:.15s}
.ppc-wave span:nth-child(5){height:7px;animation-delay:.05s}
@keyframes ppc-wave-anim{0%,100%{transform:scaleY(.5);opacity:.4}50%{transform:scaleY(1);opacity:1}}
.ppc-typing-txt{font-size:11px;color:#475569;font-style:italic;animation:ppc-fade-loop 2s ease-in-out infinite}
@keyframes ppc-fade-loop{0%,100%{opacity:.5}50%{opacity:1}}

/* ── Input area ────────────────────────────────────────────────────────────── */
#ppc-input-area{
  flex-shrink:0;padding:10px 13px 13px;
  border-top:1px solid rgba(255,255,255,.055);
  position:relative;z-index:1;
  background:linear-gradient(0deg,rgba(6,7,18,.6) 0%,transparent 100%);
}
#ppc-input-row{
  display:flex;gap:8px;align-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:15px;padding:8px 9px 8px 12px;
  transition:border-color .2s,box-shadow .2s;
}
#ppc-input-row:focus-within{
  border-color:rgba(99,102,241,.5);
  box-shadow:0 0 0 3px rgba(99,102,241,.1),0 4px 20px rgba(0,0,0,.2);
}
#ppc-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:13px;color:#e2e8f0;resize:none;padding:0;line-height:1.6;
  font-family:'Space Grotesk',sans-serif;
  max-height:100px;min-height:22px;overflow-y:auto;
}
#ppc-input::placeholder{color:rgba(255,255,255,.2)}

/* Send button */
#ppc-send{
  width:36px;height:36px;border:none;border-radius:11px;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(99,102,241,.5);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
#ppc-send:hover:not(:disabled){transform:scale(1.12) rotate(-5deg);box-shadow:0 4px 20px rgba(99,102,241,.7)}
#ppc-send:active:not(:disabled){transform:scale(.95)}
#ppc-send:disabled{opacity:.35;cursor:not-allowed;transform:none}

#ppc-hint{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:7px;padding:0 2px;
}
.ppc-hint-txt{font-size:10px;color:rgba(255,255,255,.13);letter-spacing:.02em}
#ppc-char-count{font-size:10px;color:rgba(255,255,255,.13);transition:color .2s}
#ppc-char-count.warn{color:rgba(245,158,11,.5)}

/* ── Attach button ──────────────────────────────────────────────────────── */
#ppc-attach-btn{
  width:32px;height:32px;border:none;border-radius:9px;cursor:pointer;flex-shrink:0;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:#64748b;display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
#ppc-attach-btn:hover{
  background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.35);
  color:#a5b4fc;transform:scale(1.08) rotate(-8deg);
}
#ppc-attach-btn.has-file{
  background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.4);color:#818cf8;
}

/* ── File pill ──────────────────────────────────────────────────────────── */
#ppc-file-pill{
  display:none;align-items:center;gap:7px;
  margin-top:7px;padding:6px 10px;border-radius:10px;
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);
  animation:ppc-msg-in .25s both;
}
#ppc-file-pill.show{display:flex}
.ppc-file-ico{font-size:14px;flex-shrink:0}
#ppc-file-label{
  flex:1;min-width:0;font-size:11.5px;font-weight:600;
  color:#a5b4fc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Space Grotesk',sans-serif;
}
.ppc-file-size{font-size:10px;color:#475569;flex-shrink:0}
#ppc-file-remove{
  width:18px;height:18px;border:none;border-radius:5px;cursor:pointer;
  background:rgba(255,255,255,.07);color:#64748b;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  transition:all .15s;flex-shrink:0;padding:0;
}
#ppc-file-remove:hover{background:rgba(239,68,68,.2);color:#f87171}

/* Upload spinner */
.ppc-file-uploading .ppc-file-ico{animation:ppc-spin .7s linear infinite;display:inline-block}

/* Supported types label */
#ppc-supported{
  font-size:9.5px;color:rgba(255,255,255,.1);text-align:center;
  margin-top:5px;letter-spacing:.01em;
}
</style>

<!-- Trigger -->
<div id="ppc-wrap">
  <button id="ppc-btn" onclick="ppcOpen()" aria-label="Open PPC Assistant">
    <svg class="ppc-ico" id="ppc-ico-chat" width="23" height="23" fill="none" viewBox="0 0 24 24">
      <path stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <svg class="ppc-ico" id="ppc-ico-close" width="20" height="20" fill="none" viewBox="0 0 24 24">
      <path stroke="#fff" stroke-width="2.5" stroke-linecap="round" d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>
  <div id="ppc-tip">PPC Assistant</div>
</div>

<!-- Panel -->
<div id="ppc-border">
  <div id="ppc-panel">

    <!-- Header -->
    <div id="ppc-hdr">
      <div class="ppc-hdr-top">
        <div class="ppc-av">⚡</div>
        <div class="ppc-hdr-info">
          <div class="ppc-hdr-title">PPC Assistant</div>
          </div>
        <div class="ppc-hdr-btns">
          <!-- Memory button -->
          <button class="ppc-hbtn" id="ppc-mem-btn" onclick="ppcShowMemory()" aria-label="View memory" title="Saved memories" style="position:relative">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
            </svg>
            <span id="ppc-mem-badge" style="display:none;position:absolute;top:-4px;right:-4px;
              width:14px;height:14px;border-radius:50%;background:#6366f1;
              font-size:8px;font-weight:700;color:#fff;align-items:center;justify-content:center;
              border:1.5px solid #080a18;"></span>
          </button>
          <!-- Expand toggle -->
          <button class="ppc-hbtn" id="ppc-expand-btn" onclick="ppcToggleExpand()" aria-label="Expand">
            <svg id="ppc-expand-ico" width="13" height="13" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-width="2" stroke-linecap="round"
                d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
          <!-- Close -->
          <button class="ppc-hbtn" onclick="ppcOpen()" aria-label="Close">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="ppc-pills">
        <span class="ppc-pill ppc-pill-v">👁 Visitors</span>
        <span class="ppc-pill ppc-pill-s">📡 Signal Tracker</span>
        <span class="ppc-pill ppc-pill-a">🎯 Ad Intelligence</span>
      </div>
    </div>

    <!-- Messages + scroll btn -->
    <div id="ppc-msgs"></div>
    <button id="ppc-scroll-btn" onclick="ppcScrollBottom()" aria-label="Scroll to bottom">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </button>

    <!-- Input -->
    <div id="ppc-input-area">
      <div id="ppc-input-row">
        <!-- Attach button -->
        <button id="ppc-attach-btn" onclick="ppcAttachClick()" title="Attach file" aria-label="Attach file">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea id="ppc-input" rows="1" placeholder="Ask anything — or attach a file…"></textarea>
        <button id="ppc-send" aria-label="Send">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
            <path stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
              d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>

      <!-- Attached file pill -->
      <div id="ppc-file-pill">
        <span class="ppc-file-ico">📎</span>
        <span id="ppc-file-label">file.pdf</span>
        <span class="ppc-file-size" id="ppc-file-size"></span>
        <button id="ppc-file-remove" onclick="ppcRemoveFile()" aria-label="Remove file">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none">
            <path stroke="currentColor" stroke-width="3" stroke-linecap="round" d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <span id="ppc-char-count" style="display:none"></span>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="ppc-file-input" style="display:none"
      accept=".pdf,.docx,.doc,.xlsx,.xls,.csv,.txt,.md,.json,.png,.jpg,.jpeg,.gif,.webp,.pptx,.ppt"
      onchange="ppcFileSelected(this)"/>

  </div>
</div>

<!-- Spinner keyframe injected once -->
<style>@keyframes ppc-spin{to{transform:rotate(360deg)}}</style>

<script>
(function () {
  /* ── State ── */
  var _hist      = [];
  var _busy      = false;
  var _fresh     = true;
  var _expanded  = false;
  var _file      = null;
  var _uploading = false;
  var _memories  = [];     // persistent facts saved by user

  /* ── Persistence helpers ── */
  var _HIST_KEY = 'ppc_chat_hist_v1';
  var _MEM_KEY  = 'ppc_chat_mem_v1';

  function _loadPersisted() {
    try {
      var h = localStorage.getItem(_HIST_KEY);
      if (h) _hist = JSON.parse(h).slice(-24);
      var m = localStorage.getItem(_MEM_KEY);
      if (m) _memories = JSON.parse(m);
    } catch(e) {}
  }

  function _saveHist() {
    try { localStorage.setItem(_HIST_KEY, JSON.stringify(_hist.slice(-24))); } catch(e) {}
  }

  function _saveMem() {
    try { localStorage.setItem(_MEM_KEY, JSON.stringify(_memories)); } catch(e) {}
    _updateMemBadge();
  }

  function _updateMemBadge() {
    var badge = document.getElementById('ppc-mem-badge');
    if (badge) {
      badge.textContent = _memories.length || '';
      badge.style.display = _memories.length ? 'flex' : 'none';
    }
  }

  // Run on load
  _loadPersisted();

  /* ── Memory commands ── */
  window.ppcShowMemory = function () {
    if (_memories.length === 0) {
      _addMsg('assistant', '🧠 No saved memories yet.\n\nSay **"remember that [fact]"** to save something permanently. Example:\n• "remember that our main focus is healthcare PPC"\n• "remember that our target CPA is $120"');
    } else {
      _addMsg('assistant', '🧠 **Saved memories** (' + _memories.length + '):\n\n' +
        _memories.map(function(m, i){ return (i+1) + '. ' + m; }).join('\n') +
        '\n\nSay **"forget [fact]"** to remove one, or **"clear all memories"** to wipe everything.');
    }
    if (!document.getElementById('ppc-border').classList.contains('open')) ppcOpen();
    var wlc = document.getElementById('ppc-welcome');
    if (wlc) wlc.remove();
  };

  function _handleMemoryCommand(msg) {
    var lower = msg.toLowerCase().trim();

    // "remember that X" or "remember X"
    var remMatch = msg.match(/^remember\s+(that\s+)?(.+)/i);
    if (remMatch) {
      var fact = remMatch[2].trim();
      _memories.push(fact);
      _saveMem();
      _addMsg('assistant', '🧠 Got it — I\'ll remember:\n**"' + fact + '"**\n\nThis will carry over to every future conversation.');
      return true;
    }

    // "forget X"
    var forgetMatch = msg.match(/^forget\s+(?!everything|all)(.+)/i);
    if (forgetMatch) {
      var target = forgetMatch[1].trim().toLowerCase();
      var before = _memories.length;
      _memories = _memories.filter(function(m){ return !m.toLowerCase().includes(target); });
      _saveMem();
      var removed = before - _memories.length;
      _addMsg('assistant', removed > 0
        ? '🗑️ Removed ' + removed + ' memor' + (removed === 1 ? 'y' : 'ies') + ' matching "' + target + '".'
        : '❓ No memory found matching "' + target + '".');
      return true;
    }

    // "clear all memories" / "forget everything"
    if (/^(clear all memories|forget everything|clear memory|reset memory)$/i.test(lower)) {
      _memories = [];
      _saveMem();
      _addMsg('assistant', '🗑️ All memories cleared.');
      return true;
    }

    // "what do you remember" / "show memory"
    if (/what do you remember|show memory|my memories|list memories/i.test(lower)) {
      ppcShowMemory();
      return true;
    }

    return false;
  }

  /* ── Open / close ── */
  window.ppcOpen = function () {
    var btn    = document.getElementById('ppc-btn');
    var border = document.getElementById('ppc-border');
    var isOpen = border.classList.contains('open');
    btn.classList.toggle('open', !isOpen);
    border.classList.toggle('open', !isOpen);
    if (!isOpen) {
      if (_fresh) {
        _fresh = false;
        _updateMemBadge();
        if (_hist.length > 0) {
          _restoreSession();
        } else {
          _welcome();
        }
      }
      setTimeout(function () { document.getElementById('ppc-input').focus(); }, 380);
    }
  };

  function _restoreSession() {
    var msgs = document.getElementById('ppc-msgs');
    // Show last few exchanges from previous session
    var recent = _hist.slice(-8);
    var notice = document.createElement('div');
    notice.style.cssText = 'text-align:center;padding:8px 12px;font-size:10.5px;color:#475569;font-family:\'Space Grotesk\',sans-serif;';
    notice.innerHTML = '— Resuming previous session —';
    msgs.appendChild(notice);
    recent.forEach(function(turn) {
      _addMsg(turn.role, turn.content);
    });
  }

  /* ── Expand / collapse ── */
  window.ppcToggleExpand = function () {
    _expanded = !_expanded;
    var border = document.getElementById('ppc-border');
    var ico    = document.getElementById('ppc-expand-ico');
    border.classList.toggle('expanded', _expanded);

    // Swap icon between expand ⤢ and collapse ⤡
    ico.innerHTML = _expanded
      ? '<path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>'
      : '<path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
  };

  /* ── Welcome screen ── */
  function _welcome() {
    var msgs = document.getElementById('ppc-msgs');
    var el   = document.createElement('div');
    el.id    = 'ppc-welcome';
    el.innerHTML =
      '<div class="ppc-orb-wrap">' +
        '<div class="ppc-wlc-orb">⚡</div>' +
        '<div class="ppc-orb-ring"></div>' +
        '<div class="ppc-orb-ring2"></div>' +
      '</div>' +
      '<div class="ppc-wlc-title">What do you want to know?</div>' +
      '<div class="ppc-wlc-sub">Ask about visitors, competitor ads,<br>buying signals, or anything PPC.</div>' +
      '<div class="ppc-grid">' +
        _chip('👥','Who visited us this week?') +
        _chip('💰','Recent funding rounds?') +
        _chip('🎯','Inspire Aesthetics active ads?') +
        _chip('👔','Show me VP+ level visitors') +
      '</div>';
    msgs.appendChild(el);
  }

  function _chip(emoji, q) {
    return '<div class="ppc-chip" data-q="' + q.replace(/"/g, '&quot;') + '" onclick="ppcSugg(this)">' +
      '<span class="ppc-chip-ico">' + emoji + '</span>' + q + '</div>';
  }

  window.ppcSugg = function (el) {
    document.getElementById('ppc-input').value = el.getAttribute('data-q');
    ppcSend();
  };

  /* ── Scroll to bottom ── */
  window.ppcScrollBottom = function () {
    var msgs = document.getElementById('ppc-msgs');
    msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' });
  };

  /* ── File attachment ── */
  window.ppcAttachClick = function () {
    document.getElementById('ppc-file-input').click();
  };

  window.ppcFileSelected = function (inp) {
    var file = inp.files[0];
    if (!file) return;
    inp.value = '';   // allow re-selecting same file
    if (_uploading) return;
    _uploading = true;

    // Show uploading state
    _setFilePill('⏳', file.name + ' — uploading…', '', true);
    document.getElementById('ppc-attach-btn').classList.add('has-file');

    var fd = new FormData();
    fd.append('file', file);

    fetch('/api/ppc-upload', { method: 'POST', body: fd })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          _clearFilePill();
          _addMsg('assistant', '⚠️ Could not read file: ' + data.error);
          return;
        }
        _file = data;
        var size = data.is_image ? _fmtBytes(data.base64 ? Math.round(data.base64.length * 0.75) : 0)
                                 : _fmtChars(data.chars);
        var ico  = data.is_image ? '🖼️' : _fileIco(data.name);
        _setFilePill(ico, data.name, size, false);
        if (data.truncated) {
          _addMsg('assistant', '⚠️ The file is very large — only the first 40,000 characters were read. The rest was trimmed.');
        }
      })
      .catch(function () {
        _clearFilePill();
        _addMsg('assistant', '⚠️ Upload failed. Check your connection and try again.');
      })
      .finally(function () { _uploading = false; });
  };

  window.ppcRemoveFile = function () {
    _file = null;
    _clearFilePill();
    document.getElementById('ppc-attach-btn').classList.remove('has-file');
  };

  function _setFilePill(ico, label, size, uploading) {
    var pill = document.getElementById('ppc-file-pill');
    pill.className = 'show' + (uploading ? ' ppc-file-uploading' : '');
    document.querySelector('.ppc-file-ico').textContent = ico;
    document.getElementById('ppc-file-label').textContent = label;
    document.getElementById('ppc-file-size').textContent = size;
  }

  function _clearFilePill() {
    document.getElementById('ppc-file-pill').className = '';
    document.getElementById('ppc-attach-btn').classList.remove('has-file');
    _file = null;
  }

  /* ── Export helpers ── */
  function _detectExportFormat(msg) {
    var m = msg.toLowerCase();
    if (/excel|xlsx/.test(m))             return 'excel';
    if (/\bcsv\b/.test(m))                return 'csv';
    if (/\bjson\b/.test(m))               return 'json';
    if (/\btable\b|\bspreadsheet\b/.test(m)) return 'table';
    if (/bullet|list format/.test(m))     return 'bullet';
    return null;
  }

  function _getLastAiText() {
    var bubbles = document.querySelectorAll('.ppc-row.assistant .ppc-bubble');
    for (var i = bubbles.length - 1; i >= 0; i--) {
      var t = bubbles[i].innerText || bubbles[i].textContent;
      if (t && t.length > 20 && !t.includes('Thinking')) return t.trim();
    }
    return '';
  }

  function _downloadText(text, filename, mime) {
    var BOM  = mime === 'text/csv' ? '﻿' : '';  // UTF-8 BOM for CSV only
    var blob = new Blob([BOM + text], { type: (mime || 'text/csv') + ';charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function _addDownloadBtn(container, text, fmt) {
    var ext  = fmt === 'json' ? 'json' : fmt === 'table' ? 'md' : 'csv';
    var mime = fmt === 'json' ? 'application/json' : fmt === 'table' ? 'text/markdown' : 'text/csv';
    var name = 'ppc_export_' + new Date().toISOString().slice(0,10) + '.' + ext;
    var btn  = document.createElement('button');
    btn.innerHTML = '⬇ Download .' + ext.toUpperCase();
    btn.style.cssText = 'margin-top:8px;padding:5px 12px;border-radius:8px;border:1px solid rgba(99,102,241,.4);' +
      'background:rgba(99,102,241,.12);color:#a5b4fc;font-size:11px;font-weight:600;cursor:pointer;' +
      'font-family:\'Space Grotesk\',sans-serif;transition:all .15s;display:block;';
    btn.onmouseover = function(){ this.style.background='rgba(99,102,241,.25)'; };
    btn.onmouseout  = function(){ this.style.background='rgba(99,102,241,.12)'; };
    btn.onclick = function(){ _downloadText(text, name, mime); };
    container.appendChild(btn);
  }

  /* Build a scrollable HTML table preview from CSV text */
  function _buildTablePreview(csv) {
    var lines = csv.trim().split('\n').filter(function(l){ return l.trim(); });
    if (lines.length < 2) {
      var pre = document.createElement('pre');
      pre.style.cssText = 'font-size:11px;color:#94a3b8;margin-top:8px;white-space:pre-wrap;font-family:monospace;';
      pre.textContent = csv.slice(0, 800);
      return pre;
    }

    function parseRow(line) {
      var cols = [], cur = '', inQ = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      return cols;
    }

    var headers = parseRow(lines[0]);
    var da
