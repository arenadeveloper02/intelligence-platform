<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — Platform</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Ccircle cx='16' cy='21' r='2.5' fill='%23fff'/%3E%3Cpath d='M10 15 Q16 9 22 15' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Cpath d='M6 11 Q16 2 26 11' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round' opacity='.55'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(160deg, #080b18 0%, #0a0d1a 40%, #070912 100%);
      color: #e2e8f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(99,102,241,.1) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .bg-glow {
      position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
      width: 600px; height: 600px; top: -150px; left: -100px;
      background: rgba(239,68,68,.06);
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(13,15,23,.95); border: 1px solid rgba(255,255,255,.07);
      border-radius: 24px; padding: 52px 48px 44px; text-align: center;
      max-width: 440px; width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    .icon-wrap {
      width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 28px;
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .code {
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: #ef4444; margin-bottom: 14px;
    }
    h1 {
      font-size: 26px; font-weight: 700; color: #f1f5f9; letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px; color: #475569; line-height: 1.65; margin-bottom: 36px;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 28px; border-radius: 10px; font-size: 13px; font-weight: 600;
      font-family: inherit; text-decoration: none; cursor: pointer; transition: all .15s;
      background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.3); color: #818cf8;
    }
    .btn-home:hover { background: rgba(99,102,241,.22); border-color: rgba(99,102,241,.5); }
  </style>
<style id="hide-scrollbars">
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}
*::-webkit-scrollbar{width:0 !important;height:0 !important;display:none !important;}
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="icon-wrap">🔒</div>
    <div class="code">403 — Access Denied</div>
    <h1>You don't have permission</h1>
    <p>This page is restricted to admin users only.<br/>If you think this is a mistake, contact Krishna.</p>
    <a href="/hub" class="btn-home">← Back to Hub</a>
  </div>
<style>
.card{animation:pgPop .8s cubic-bezier(.22,1,.36,1) both}
@keyframes pgPop{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}
.icon-wrap{animation:pgFloat 4s ease-in-out infinite}
@keyframes pgFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@media (prefers-reduced-motion:reduce){.card,.icon-wrap{animation:none}}
</style>

<style>
/* ===== CINEMA kit ===== */
html.lenis,html.lenis body{height:auto}
.lenis.lenis-smooth{scroll-behavior:auto !important}
.lenis.lenis-smooth [data-lenis-prevent]{overscroll-behavior:contain}
.lenis.lenis-stopped{overflow:hidden}
.lenis.lenis-smooth iframe{pointer-events:none}
.cz-prog{position:fixed;top:0;left:0;height:2.5px;width:0;z-index:99996;pointer-events:none;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#22d3ee);box-shadow:0 0 12px rgba(129,140,248,.55)}
.cz-par{will-change:transform}
.cz-reveal{opacity:0;transform:translateY(34px);transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1)}
.cz-reveal.cz-in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.cz-prog{display:none}.cz-reveal{opacity:1;transform:none;transition:none}}
</style>
<script>
/* ===== CINEMA kit — inertia smooth scroll, progress, parallax, reveals ===== */
(function(){
  if(window.__cinema)return;window.__cinema=1;
  var RM=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  var bar=document.createElement('div');bar.className='cz-prog';
  (document.body||document.documentElement).appendChild(bar);
  function setProg(y){
    var h=document.documentElement.scrollHeight-window.innerHeight;
    bar.style.width=(h>0?Math.min(100,Math.max(0,(y/h)*100)):0)+'%';
  }

  var pars=[];
  function collect(){
    pars=[];
    document.querySelectorAll('[data-cz-par]').forEach(function(el){
      el.classList.add('cz-par');
      pars.push({el:el,sp:parseFloat(el.getAttribute('data-cz-par'))||0.1});
    });
  }
  function applyPar(){
    var vh=window.innerHeight;
    for(var i=0;i<pars.length;i++){
      var p=pars[i],r=p.el.getBoundingClientRect();
      var d=(r.top+r.height/2)-vh/2;
      p.el.style.transform='translate3d(0,'+(-d*p.sp).toFixed(2)+'px,0)';
    }
  }
  function frame(y){setProg(y);if(!RM&&pars.length)applyPar();}

  // reveal engine for opt-in [data-cz-reveal]
  function reveals(){
    var els=document.querySelectorAll('[data-cz-reveal]');
    if(!els.length)return;
    els.forEach(function(e,i){e.classList.add('cz-reveal');
      var d=e.getAttribute('data-cz-reveal');if(d&&d!=='')e.style.transitionDelay=d+'ms';});
    if(!('IntersectionObserver' in window)){els.forEach(function(e){e.classList.add('cz-in');});return;}
    var io=new IntersectionObserver(function(es){es.forEach(function(en){
      if(en.isIntersecting){en.target.classList.add('cz-in');io.unobserve(en.target);}});},
      {threshold:.12,rootMargin:'0px 0px -8% 0px'});
    els.forEach(function(e){io.observe(e);});
  }

  function autoPrevent(){
    ['#kpal-list','.kpal-box','[data-lenis-stop]'].forEach(function(s){
      document.querySelectorAll(s).forEach(function(e){e.setAttribute('data-lenis-prevent','');});
    });
  }

  function go(){
    collect();reveals();autoPrevent();
    var L=window.Lenis||(window.lenis&&window.lenis.default)||null;
    if(!L||RM){
      window.addEventListener('scroll',function(){frame(window.scrollY||window.pageYOffset||0);},{passive:true});
      window.addEventListener('resize',function(){collect();frame(window.scrollY||0);});
      frame(window.scrollY||0);return;
    }
    var lenis=new L({duration:1.15,
      easing:function(t){return Math.min(1,1.001-Math.pow(2,-10*t));},
      smoothWheel:true,wheelMultiplier:1,touchMultiplier:1.5,gestureOrientation:'vertical',
      prevent:function(node){var el=node;
        while(el&&el!==document.body&&el!==document.documentElement){
          try{if(el.hasAttribute&&el.hasAttribute('data-lenis-prevent'))return true;
          var oy=getComputedStyle(el).overflowY;
          if((oy==='auto'||oy==='scroll')&&el.scrollHeight>el.clientHeight+2)return true;}catch(e){}
          el=el.parentElement;}
        return false;}});
    window.__lenis=lenis;
    lenis.on('scroll',function(e){frame(e.scroll||e.animatedScroll||0);});
    function raf(t){lenis.raf(t);requestAnimationFrame(raf);}
    requestAnimationFrame(raf);
    window.addEventListener('resize',function(){collect();});
    document.addEventListener('click',function(e){
      var a=e.target.closest&&e.target.closest('a[href^="#"]');
      if(!a)return;var id=a.getAttribute('href');if(!id||id.length<2)return;
      var t=document.querySelector(id);if(!t)return;
      e.preventDefault();lenis.scrollTo(t,{offset:-78,duration:1.3});
    });
    frame(0);
  }

  function boot(){
    if(RM){go();return;}
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js';
    s.onload=go;s.onerror=go;
    document.head.appendChild(s);
    setTimeout(function(){if(!window.__lenis&&!window.__czfb){window.__czfb=1;go();}},2500);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
  else boot();
})();
</script>

</body>
</html>
